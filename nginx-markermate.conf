##
# Nginx configuration for markermate.ai
##

server {
    listen 80;
    listen [::]:80;

    server_name markermate.ai www.markermate.ai;

    # Frontend - serve static React build
    root /home/ryan/marker-mate/frontend/build;
    index index.html;

    # API requests - proxy to Node.js backend
    location /api/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Increased timeouts for AI processing
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # Increase max body size for file uploads
        client_max_body_size 50M;
    }

    # Frontend routes - serve index.html for React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Increase max body size for file uploads globally
    client_max_body_size 50M;
}
