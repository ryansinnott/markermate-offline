##
# Nginx configuration for ryansinnott.com.au
##

server {
	listen 80 default_server;
	listen [::]:80 default_server;

	root /var/www/html;
	index index.html index.htm;

	server_name _;

	# Redirect root to beaches app
	location = / {
		return 301 /project/beaches/;
	}

	# Beaches app - proxy to Node.js
	location /project/beaches/ {
		proxy_pass http://127.0.0.1:3000/;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection 'upgrade';
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_cache_bypass $http_upgrade;
	}

	# Handle /project/beaches without trailing slash
	location = /project/beaches {
		return 301 /project/beaches/;
	}

	# Christmas (Secret Santa) app - proxy to Node.js (no trailing slash preserves path)
	location /project/Christmas/ {
		proxy_pass http://127.0.0.1:3001;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection 'upgrade';
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_cache_bypass $http_upgrade;
	}

	# Handle /project/Christmas without trailing slash
	location = /project/Christmas {
		return 301 /project/Christmas/;
	}

	# MarkerMate API - proxy to Node.js backend
	location /project/markermate/api/ {
		proxy_pass http://127.0.0.1:3002/api/;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection 'upgrade';
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_cache_bypass $http_upgrade;

		# Increased timeouts for AI processing
		proxy_connect_timeout 120s;
		proxy_send_timeout 120s;
		proxy_read_timeout 120s;

		# Increase max body size for file uploads
		client_max_body_size 50M;
	}

	# MarkerMate frontend - serve static React build
	location /project/markermate/ {
		alias /home/ryan/marker-mate/frontend/build-subdirectory/;
		index index.html;
		try_files $uri $uri/ /project/markermate/index.html;
	}

	# Handle /project/markermate without trailing slash
	location = /project/markermate {
		return 301 /project/markermate/;
	}

	# Default location for other paths
	location / {
		try_files $uri $uri/ =404;
	}
}
